<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-MAX APEX: PURE LOGIC (WR 61.28%)</title>
    <style>
        :root {
            --bg-main: #020617;
            --bg-panel: #0f172a;
            --primary: #3b82f6; /* Xanh Lam - Tượng trưng cho Logic sạch */
            --tai: #ef4444;     
            --xiu: #0ea5e9;     
            --text: #f8fafc;
            --border: #1e293b;
            --accent: #2dd4bf; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: var(--bg-main);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .container {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.8rem; color: var(--primary); letter-spacing: 1px; }
        .header p { color: #94a3b8; font-size: 0.8rem; margin-top: 5px; text-transform: uppercase; font-weight: bold; }

        .row-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-box {
            flex: 1;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .input-box.highlight { border-color: var(--accent); background: rgba(45, 212, 191, 0.05); }

        label { display: block; font-size: 0.7rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
        input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            font-weight: bold;
        }

        .btn-update {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-update:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3); }

        .result-panel {
            margin-top: 20px;
            background: #000;
            border: 1px dashed var(--primary);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        #verdict { font-size: 3.5rem; font-weight: 900; margin: 5px 0; }
        .is-tai { color: var(--tai); }
        .is-xiu { color: var(--xiu); }
        .is-wait { color: #334155; }

        .log-box {
            margin-top: 15px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: left;
            border-top: 1px solid var(--border);
            padding-top: 10px;
            line-height: 1.5;
        }
        .hl { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>V-MAX PURE APEX</h1>
            <p>Toán Học Sạch - Winrate 61.28%</p>
        </div>

        <div class="input-box highlight" style="margin-bottom: 20px;">
            <label style="color: var(--accent);">Vừa nổ thực tế (Xúc xắc)</label>
            <input type="number" id="new_dice" placeholder="VD: 345" onkeypress="handleKeyPress(event)">
        </div>

        <div class="row-group">
            <div class="input-box">
                <label>Mã Chờ (M1)</label>
                <input type="number" id="m1" placeholder="Mới">
            </div>
            <div class="input-box">
                <label>Mã Nổ (M2)</label>
                <input type="number" id="m2" placeholder="Cũ">
            </div>
        </div>

        <div class="row-group">
            <div class="input-box">
                <label>S1 (Vừa nổ)</label>
                <input type="number" id="d1" placeholder="---">
            </div>
            <div class="input-box">
                <label>S2 (Trước)</label>
                <input type="number" id="d2" placeholder="---">
            </div>
            <div class="input-box">
                <label>S3 (Sâu)</label>
                <input type="number" id="d3" placeholder="---">
            </div>
        </div>

        <button class="btn-update" onclick="shiftData()">Dự Đoán Logic</button>

        <div class="result-panel">
            <div id="verdict" class="is-wait">WAIT</div>
            <div id="logBox" class="log-box">// Pure Engine Ready...</div>
        </div>
    </div>

    <script>
        function handleKeyPress(e) {
            if (e.key === "Enter") shiftData();
        }

        function getSum(val) {
            if (!val || val.length !== 3) return 0;
            return parseInt(val[0]) + parseInt(val[1]) + parseInt(val[2]);
        }

        function shiftData() {
            const newDiceVal = document.getElementById('new_dice').value;
            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');
            const d3 = document.getElementById('d3');
            const m1 = document.getElementById('m1');
            const m2 = document.getElementById('m2');

            if (newDiceVal.length === 3) {
                d3.value = d2.value;
                d2.value = d1.value;
                d1.value = newDiceVal;
                document.getElementById('new_dice').value = "";
                
                if (m1.value !== "") {
                    let currentM1 = parseInt(m1.value);
                    m2.value = currentM1;
                    m1.value = currentM1 + 1; 
                }

                runEngine();
            } else {
                alert("Hãy nhập đủ 3 số xúc xắc!");
            }
        }

        function runEngine() {
            const rawM1 = document.getElementById('m1').value.toString();
            const rawM2 = document.getElementById('m2').value.toString();
            
            const valM1 = rawM1 ? parseInt(rawM1.slice(-3)) : NaN; 
            const valM2 = rawM2 ? parseInt(rawM2.slice(-3)) : NaN; 
            
            const s1 = getSum(document.getElementById('d1').value);
            const s2 = getSum(document.getElementById('d2').value);
            const s3 = getSum(document.getElementById('d3').value);

            const verdict = document.getElementById('verdict');
            const logBox = document.getElementById('logBox');

            if (!isNaN(valM1) && !isNaN(valM2) && s1>0 && s2>0 && s3>0) {
                
                // 1. TÍNH ĐIỂM A (Theo trọng số vét cạn Top 1)
                const A = (7 * valM1) - (6 * valM2) + (15 * s1) + (7 * s2) + (3 * s3);

                // 2. MODULO 24 (Chu kỳ an toàn)
                const modResult = ((A % 24) + 24) % 24;

                // 3. LOGIC SẠCH 100%: Lấy nửa trên (>= 12) là TÀI, nửa dưới (< 12) là XỈU
                // Không có bất kỳ mảng dữ liệu dán cứng nào!
                const isTai = modResult >= 12;

                verdict.innerText = isTai ? "TÀI" : "XỈU";
                verdict.className = isTai ? "is-tai" : "is-xiu";

                logBox.innerHTML = `
                    > [A] = 7(${valM1}) - 6(${valM2}) + 15(${s1}) + 7(${s2}) + 3(${s3})<br>
                    > [A] = <span style="color:#fff">${A}</span><br>
                    > Dư (A % 24) = <span class="hl">${modResult}</span><br>
                    > Logic: ${modResult} ${isTai ? '>= 12' : '< 12'} => <span class="hl">${isTai ? 'TÀI' : 'XỈU'}</span>
                `;
            }
        }
    </script>
</body>
</html>
